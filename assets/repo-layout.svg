  <line x1="487" y1="100" x2="487" y2="486" stroke="#1c3350" stroke-width="1"/>

  <!-- tree connector strokes (explicit elbows; no glyph characters) -->
  <!-- depth1 guide: children of atlas-method/ are README.md(y115), LICENSE(y139), versions/(y163, last) -->
  <g fill="none" stroke="#5a7799" stroke-width="1.3">
    <!-- depth1 vertical from root row down to last child (versions/) -->
    <path d="M 111 97 L 111 159"/>
    <path d="M 111 111 L 123 111"/>
    <path d="M 111 135 L 123 135"/>
    <path d="M 111 159 L 123 159"/>

