  <line x1="458" y1="84" x2="458" y2="474" stroke="#1c3350" stroke-width="1"/>

  <!-- tree connector strokes (explicit elbows; no glyph characters) -->
  <!-- depth1 guide: children of atlas-method/ are README.md(y130), LICENSE(y154), versions/(y178, last) -->
  <g fill="none" stroke="#5a7799" stroke-width="1.3">
    <!-- depth1 vertical from root row down to last child (versions/) -->
    <path d="M 88 112 L 88 174"/>
    <path d="M 88 126 L 100 126"/>
    <path d="M 88 150 L 100 150"/>
    <path d="M 88 174 L 100 174"/>

