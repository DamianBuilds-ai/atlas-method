    <text x="470" y="130" fill="#22D3EE">&#9656;&#160;you are here</text>
    <text x="470" y="154" fill="#C99A3A">&#9656;&#160;MIT</text>
    <text x="470" y="202" fill="#C99A3A">&#9656;&#160;first public release</text>
